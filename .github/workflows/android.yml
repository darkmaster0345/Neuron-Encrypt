name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          android/neuron-encrypt-jni/target
        key: ${{ runner.os }}-android-cargo-${{ hashFiles('android/neuron-encrypt-jni/Cargo.lock', 'neuron-encrypt/Cargo.lock') }}

    - name: Install cargo-ndk
      run: cargo install cargo-ndk --locked

    - name: Build Rust JNI Libraries
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        chmod +x android/build-rust.sh
        ./android/build-rust.sh

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Set up Gradle Wrapper
      run: |
        cd android
        gradle wrapper --gradle-version 8.5

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neuron-encrypt-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
