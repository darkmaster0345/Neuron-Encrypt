name: Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: neuron-encrypt/target/x86_64-unknown-linux-gnu/release/neuron-encrypt
            asset_name: NeuronEncrypt-Linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: neuron-encrypt/target/x86_64-pc-windows-msvc/release/neuron-encrypt.exe
            asset_name: NeuronEncrypt-Windows.exe
          - os: macos-latest
            target: universal-apple-darwin
            output: NeuronEncrypt-macOS
            asset_name: NeuronEncrypt-macOS

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-xcb-dev libxcb-dri2-0-dev libxcb-dri3-dev libxcb-present-dev libxcb-sync-dev libxcb-randr0-dev libxcb-util-dev libxcb-shm0-dev libxcb-glx0-dev libasound2-dev libgtk-3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Build (Non-macOS)
        if: matrix.os != 'macos-latest'
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: neuron-encrypt

      - name: Build (macOS Universal)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          lipo -create \
            target/x86_64-apple-darwin/release/neuron-encrypt \
            target/aarch64-apple-darwin/release/neuron-encrypt \
            -output ../NeuronEncrypt-macOS
        working-directory: neuron-encrypt

      - name: Prepare Artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" != "macos-latest" ]; then
            cp ${{ matrix.output }} ./${{ matrix.asset_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: |
            artifacts/NeuronEncrypt-Windows.exe
            artifacts/NeuronEncrypt-macOS
            artifacts/NeuronEncrypt-Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
